  <script type="application/ld+json">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 15px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 35px 25px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8em;
      margin-bottom: 8px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .header p {
      font-size: 0.95em;
      opacity: 0.95;
      margin-bottom: 12px;
    }

    .badges {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .badge {
      background: rgba(255,255,255,0.25);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.75em;
      font-weight: 600;
    }

    .content {
      padding: 25px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 25px;
    }

    .stat-box {
      background: #f5f7ff;
      padding: 15px;
      border-radius: 12px;
      border-left: 4px solid #667eea;
      text-align: center;
    }

    .stat-label {
      color: #999;
      font-size: 0.8em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 1.8em;
      font-weight: 800;
      color: #667eea;
    }

    .options-card {
      background: #f8f9ff;
      padding: 18px;
      border-radius: 15px;
      border: 1px solid #e0e7ff;
      margin-bottom: 20px;
    }

    .options-title {
      font-weight: 700;
      color: #333;
      margin-bottom: 12px;
      font-size: 0.95em;
    }

    .option-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 0.9em;
    }

    input[type="text"],
    input[type="color"],
    input[type="number"],
    select {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9em;
      transition: all 0.3s;
    }

    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 12px rgba(102, 126, 234, 0.2);
    }

    input[type="color"] {
      height: 44px;
      cursor: pointer;
      padding: 3px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .color-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .qr-preview {
      background: #f8f9ff;
      padding: 25px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      border: 2px dashed #667eea;
      margin-bottom: 20px;
    }

    #qrcode {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #qrcode img,
    #qrcode canvas {
      max-width: 100%;
      height: auto;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 11px 0;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.85em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .btn-primary {
      background: #667eea;
      color: white;
      grid-column: 1 / 3;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: white;
      color: #333;
      border: 2px solid #ddd;
    }

    .btn-secondary:hover {
      background: #f8f9fa;
      border-color: #667eea;
      color: #667eea;
    }

    .message {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 15px;
      display: none;
      font-weight: 500;
      font-size: 0.9em;
      animation: slideDown 0.3s ease-out;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #e8f5e9;
      color: #2e7d32;
      border-left: 4px solid #4caf50;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .footer {
      background: #f8f9fa;
      padding: 20px;
      text-align: center;
      color: #666;
      border-top: 1px solid #eee;
      font-size: 0.85em;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 1.5em;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .button-group {
        grid-template-columns: 1fr 1fr;
      }

      .btn-primary {
        grid-column: 1 / 3;
      }

      .option-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📱 QR Code Generator</h1>
    <p>Create professional QR codes instantly. Download as PNG image.</p>
    <div class="badges">
      <span class="badge">💰 100% Free</span>
      <span class="badge">⚡ Instant</span>
      <span class="badge">📥 Download</span>
      <span class="badge">🔒 Secure</span>
    </div>
  </div>

  <div class="content">
    <div class="message" id="message"></div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">QR Generated</div>
        <div class="stat-value" id="generated">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Size</div>
        <div class="stat-value" id="sizeDisplay">200</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Format</div>
        <div class="stat-value">PNG</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Status</div>
        <div class="stat-value">Ready</div>
      </div>
    </div>

    <div class="options-card">
      <div class="options-title">⚙️ QR Code Settings</div>
      
      <div class="input-group">
        <label for="qrText">📝 Text or URL</label>
        <input type="text" id="qrText" placeholder="Enter URL or text..." value="https://toolyfi.com" oninput="generateQR()">
      </div>

      <div class="option-grid">
        <div>
          <label for="qrSize">📏 Size (px)</label>
          <input type="number" id="qrSize" min="100" max="500" value="200" step="50" oninput="updateSize(); generateQR()">
        </div>
        <div>
          <label for="errorLevel">🛡️ Error Level</label>
          <select id="errorLevel" onchange="generateQR()">
            <option value="L">Low (L)</option>
            <option value="M" selected>Medium (M)</option>
            <option value="Q">Quartile (Q)</option>
            <option value="H">High (H)</option>
          </select>
        </div>
      </div>

      <div class="color-row">
        <div>
          <label for="darkColor">🎨 Dark Color</label>
          <input type="color" id="darkColor" value="#000000" oninput="generateQR()">
        </div>
        <div>
          <label for="lightColor">⚪ Light Color</label>
          <input type="color" id="lightColor" value="#ffffff" oninput="generateQR()">
        </div>
      </div>
    </div>

    <div class="qr-preview">
      <div id="qrcode"></div>
    </div>

    <div class="button-group">
      <button class="btn btn-primary" onclick="downloadPNG()">📥 Download PNG</button>
      <button class="btn btn-secondary" onclick="copyQR()">📋 Copy</button>
      <button class="btn btn-secondary" onclick="clearQR()">🗑️ Clear</button>
      <button class="btn btn-secondary" onclick="resetSettings()">↻ Reset</button>
    </div>
  </div>

  <div class="footer">
    <p>🚀 Made with ❤️ by <a href="https://toolyfi.com">Toolyfi</a></p>
    <p>100% Free • No Sign-up • Instant Generation • Secure Processing</p>
  </div>
</div>

<script>
  let qrCodeInstance = null;
  let generatedCount = 0;

  function generateQR() {
    const text = document.getElementById('qrText').value;
    const size = parseInt(document.getElementById('qrSize').value);
    const darkColor = document.getElementById('darkColor').value;
    const lightColor = document.getElementById('lightColor').value;
    const errorLevel = document.getElementById('errorLevel').value;

    if (!text) {
      showMessage('Please enter text or URL', 'error');
      return;
    }

    document.getElementById('qrcode').innerHTML = '';

    qrCodeInstance = new QRCode(document.getElementById('qrcode'), {
      text: text,
      width: size,
      height: size,
      colorDark: darkColor,
      colorLight: lightColor,
      correctLevel: errorLevel === 'L' ? QRCode.CorrectLevel.L :
                   errorLevel === 'M' ? QRCode.CorrectLevel.M :
                   errorLevel === 'Q' ? QRCode.CorrectLevel.Q :
                   QRCode.CorrectLevel.H
    });

    generatedCount++;
    document.getElementById('generated').textContent = generatedCount;
    showMessage('✓ QR code generated!', 'success');
  }

  function updateSize() {
    const size = document.getElementById('qrSize').value;
    document.getElementById('sizeDisplay').textContent = size;
  }

  function downloadPNG() {
    const canvas = document.querySelector('#qrcode canvas');
    if (!canvas) {
      showMessage('Generate QR code first!', 'error');
      return;
    }

    const link = document.createElement('a');
    link.href = canvas.toDataURL('image/png');
    link.download = `qrcode-${Date.now()}.png`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showMessage('✓ Downloaded successfully!', 'success');
  }

  function copyQR() {
    const canvas = document.querySelector('#qrcode canvas');
    if (!canvas) {
      showMessage('Generate QR code first!', 'error');
      return;
    }

    canvas.toBlob(blob => {
      const item = new ClipboardItem({ 'image/png': blob });
      navigator.clipboard.write([item]).then(() => {
        showMessage('✓ Copied to clipboard!', 'success');
      });
    });
  }

  function clearQR() {
    document.getElementById('qrText').value = '';
    document.getElementById('qrcode').innerHTML = '';
    showMessage('✓ Cleared!', 'success');
  }

  function resetSettings() {
    document.getElementById('qrSize').value = '200';
    document.getElementById('darkColor').value = '#000000';
    document.getElementById('lightColor').value = '#ffffff';
    document.getElementById('errorLevel').value = 'M';
    updateSize();
    showMessage('✓ Settings reset!', 'success');
  }

  function showMessage(msg, type) {
    const messageEl = document.getElementById('message');
    messageEl.textContent = msg;
    messageEl.className = 'message show ' + type;
    setTimeout(() => messageEl.classList.remove('show'), 3000);
  }

  generateQR();
</script>

</body>
</html>
