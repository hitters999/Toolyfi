<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 Encoder/Decoder - Encode Text, Images & Files | Free Tool</title>
  <meta name="description" content="Free online Base64 encoder and decoder. Encode/decode text, images, and files. Support for image preview and bulk conversion.">
  <meta name="keywords" content="Base64 encoder, Base64 decoder, encode text, decode base64, image to base64">
  <meta name="author" content="Toolyfi">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      font-weight: 800;
    }

    .header p {
      font-size: 1.05em;
      opacity: 0.95;
      margin-bottom: 15px;
    }

    .badges {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .badge {
      background: rgba(255,255,255,0.2);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
    }

    .content {
      padding: 40px 30px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 30px;
      justify-content: center;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.95em;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 2px solid #ddd;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .editor-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .editor-label {
      font-weight: 700;
      color: #333;
      font-size: 1.05em;
    }

    textarea {
      flex: 1;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
      resize: vertical;
      min-height: 300px;
      transition: all 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 15px rgba(102, 126, 234, 0.2);
    }

    .image-preview {
      width: 100%;
      max-height: 400px;
      border-radius: 10px;
      object-fit: contain;
      display: none;
      margin-top: 15px;
    }

    .image-preview.show {
      display: block;
    }

    .upload-area {
      border: 3px dashed #667eea;
      border-radius: 10px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: #f8f9ff;
    }

    .upload-area:hover {
      border-color: #764ba2;
      background: #f0f2ff;
    }

    .upload-area.dragging {
      border-color: #764ba2;
      background: #e8ebff;
    }

    .message {
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-weight: 500;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #efe;
      color: #3c3;
      border-left: 4px solid #3c3;
    }

    .message.error {
      background: #fee;
      color: #c33;
      border-left: 4px solid #c33;
    }

    input[type="file"] {
      display: none;
    }

    .footer {
      background: #f8f9fa;
      padding: 30px;
      text-align: center;
      color: #666;
      border-top: 1px solid #eee;
      font-size: 0.95em;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 1024px) {
      .editor-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .header {
        padding: 25px 15px;
      }

      .header h1 {
        font-size: 1.8em;
      }

      .content {
        padding: 20px 15px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🔐 Base64 Encoder/Decoder</h1>
    <p>Encode text, images, and files to Base64 and vice versa</p>
    <div class="badges">
      <span class="badge">💰 100% Free</span>
      <span class="badge">⚡ Instant</span>
      <span class="badge">🖼️ Images</span>
      <span class="badge">🔒 Secure</span>
    </div>
  </div>

  <div class="content">
    <div class="message" id="message"></div>

    <div class="controls">
      <button class="btn btn-primary" onclick="encodeBase64()">🔒 Encode</button>
      <button class="btn btn-primary" onclick="decodeBase64()">🔓 Decode</button>
      <button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear</button>
      <button class="btn btn-secondary" onclick="copyOutput()">📋 Copy</button>
    </div>

    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div style="font-size: 2em; margin-bottom: 10px;">📤</div>
      <p style="font-weight: 600; color: #333; margin-bottom: 5px;">Drop image or file here</p>
      <p style="color: #999; font-size: 0.9em;">or click to browse</p>
    </div>
    <input type="file" id="fileInput" onchange="handleFileUpload(event)">

    <div class="editor-grid" style="margin-top: 30px;">
      <div class="editor-section">
        <label class="editor-label">📥 Input</label>
        <textarea id="inputText" placeholder="Enter text to encode/decode..."></textarea>
        <img id="imagePreview" class="image-preview" alt="Preview">
      </div>
      <div class="editor-section">
        <label class="editor-label">📤 Output Base64</label>
        <textarea id="outputText" placeholder="Encoded/Decoded result will appear here..." readonly></textarea>
      </div>
    </div>
  </div>

  <div class="footer">
    <p>🚀 Made with ❤️ by <a href="https://toolyfi.com">Toolyfi</a></p>
    <p>100% Free • No Sign-up • Supports Images & Files • Instant Processing</p>
  </div>
</div>

<script>
  const inputText = document.getElementById('inputText');
  const outputText = document.getElementById('outputText');
  const messageEl = document.getElementById('message');
  const uploadArea = document.getElementById('uploadArea');
  const fileInput = document.getElementById('fileInput');
  const imagePreview = document.getElementById('imagePreview');

  // Drag and drop
  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragging');
  });

  uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragging');
  });

  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragging');
    const file = e.dataTransfer.files[0];
    if (file) {
      handleFile(file);
    }
  });

  function handleFileUpload(event) {
    const file = event.target.files[0];
    if (file) {
      handleFile(file);
    }
  }

  function handleFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const result = e.target.result;
      
      // For images, show preview
      if (file.type.startsWith('image/')) {
        imagePreview.src = result;
        imagePreview.classList.add('show');
      } else {
        imagePreview.classList.remove('show');
      }

      // Set the data URL as input
      inputText.value = result;
      showMessage('📂 File loaded! Click Encode to convert to Base64', 'success');
    };
    reader.readAsDataURL(file);
  }

  function encodeBase64() {
    try {
      const text = inputText.value;
      if (!text) {
        showMessage('Please enter text or upload a file', 'error');
        return;
      }

      // Check if it's already a data URL (from file)
      if (text.startsWith('data:')) {
        outputText.value = text.split(',')[1];
      } else {
        outputText.value = btoa(unescape(encodeURIComponent(text)));
      }

      showMessage('✓ Encoded to Base64 successfully!', 'success');
    } catch (e) {
      showMessage(`✗ Error: ${e.message}`, 'error');
    }
  }

  function decodeBase64() {
    try {
      const text = inputText.value;
      if (!text) {
        showMessage('Please enter Base64 text', 'error');
        return;
      }

      const decoded = decodeURIComponent(escape(atob(text)));
      outputText.value = decoded;

      // Try to show as image if it's an image
      if (text.includes('/')) {
        imagePreview.src = 'data:image/png;base64,' + text;
        imagePreview.classList.add('show');
      } else {
        imagePreview.classList.remove('show');
      }

      showMessage('✓ Decoded from Base64 successfully!', 'success');
    } catch (e) {
      showMessage(`✗ Error: Invalid Base64 data`, 'error');
    }
  }

  function clearAll() {
    inputText.value = '';
    outputText.value = '';
    imagePreview.classList.remove('show');
    messageEl.classList.remove('show');
  }

  function copyOutput() {
    if (!outputText.value) {
      showMessage('Nothing to copy!', 'error');
      return;
    }
    navigator.clipboard.writeText(outputText.value).then(() => {
      showMessage('✓ Copied to clipboard!', 'success');
    });
  }

  function showMessage(msg, type) {
    messageEl.textContent = msg;
    messageEl.className = 'message show ' + type;
    setTimeout(() => messageEl.classList.remove('show'), 3000);
  }
</script>

</body>
</html>
